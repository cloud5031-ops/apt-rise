name: Apt National Merge

on:
  workflow_dispatch:

concurrency:
  group: apt-rise-data-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Setup DB
        run: python scripts/db.py

      - name: Merge Shards
        run: python scripts/merge_shards.py

      - name: Validate JSON
        run: python scripts/validate_json.py

      - name: Push National JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/apt_rankings_*.json
          git commit -m "Update national apt rankings" || echo "No changes to commit"
          
          # 재시도 루프 (최대 3회)
          for i in {1..4}; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              echo "Push successful."
              break
            fi
            if [ $i -eq 4 ]; then
              echo "Push failed after 3 retries"
              exit 1
            fi
            echo "Push conflict, retrying in 5 seconds..."
            sleep 5
          done
