name: Apt Region Collect

on:
  workflow_dispatch:
    inputs:
      region_group:
        description: '권역 그룹 선택'
        required: true
        default: 'seoul'
        type: choice
        options:
          - seoul
          - gyeonggi_incheon
          - metro
          - central
          - south

concurrency:
  group: apt-rise-data-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Setup DB
        run: python scripts/db.py

      - name: Collect Trades
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: python scripts/collect_trades.py --region-group ${{ inputs.region_group }}

      - name: Compute Apt Rankings (Shard mode)
        run: python scripts/compute_apt_rankings.py --region-group ${{ inputs.region_group }}

      - name: Push Shard JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/shards/
          git commit -m "Update shard data for ${{ inputs.region_group }}" || echo "No changes to commit"
          
          # 재시도 루프 (최대 3회)
          for i in {1..4}; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              echo "Push successful."
              break
            fi
            if [ $i -eq 4 ]; then
              echo "Push failed after 3 retries"
              exit 1
            fi
            echo "Push conflict, retrying in 5 seconds..."
            sleep 5
          done
