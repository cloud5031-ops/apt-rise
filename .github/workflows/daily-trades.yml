name: daily-trades
# 매일 새벽: 현재 월 + 직전 2개월 실거래 재수집 → 단지 순위 재계산 (설계안 9장)
on:
  schedule:
    - cron: "0 19 * * *"   # KST 04:00
    - cron: "0 21 * * *"   # KST 06:00 (이중 크론 - 누락 대비)
  workflow_dispatch:

concurrency:
  group: daily-trades
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 실거래 수집 (최근 3개월)
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: python scripts/collect_trades.py
      - name: 단지 순위 계산
        run: |
          python scripts/compute_apt_rankings.py
      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/apt.sqlite site/data
          git diff --cached --quiet || git commit -m "chore: daily trades $(date +%Y-%m-%d)"
          git push
