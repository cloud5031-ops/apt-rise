name: monthly-index
# 매월 16일·20일: R-ONE 가격지수 수집 → 지역 순위 재계산 (설계안 3-4)
on:
  schedule:
    - cron: "0 0 16 * *"   # KST 09:00, 16일
    - cron: "0 0 20 * *"   # KST 09:00, 20일 (수정 데이터 재확인)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 가격지수 수집 (최근 2개월)
        env:
          RONE_API_KEY: ${{ secrets.RONE_API_KEY }}
        run: python scripts/collect_price_index.py
      - name: 지역 순위 계산
        run: python scripts/compute_region_rankings.py
      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/apt.sqlite site/data
          git diff --cached --quiet || git commit -m "chore: monthly index $(date +%Y-%m)"
          git push
