name: Nationwide Weekly Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 0'

concurrency:
  group: apt-rise-data-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  nationwide-weekly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Setup DB
        run: python scripts/db.py

      - name: Collect and Compute (Seoul)
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: |
          rm -f data/apt.sqlite run_meta.json
          python scripts/db.py
          python scripts/collect_trades.py --region-group seoul
          python scripts/compute_apt_rankings.py --region-group seoul

      - name: Collect and Compute (Gyeonggi Incheon)
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: |
          rm -f data/apt.sqlite run_meta.json
          python scripts/db.py
          python scripts/collect_trades.py --region-group gyeonggi_incheon
          python scripts/compute_apt_rankings.py --region-group gyeonggi_incheon

      - name: Collect and Compute (Metro)
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: |
          rm -f data/apt.sqlite run_meta.json
          python scripts/db.py
          python scripts/collect_trades.py --region-group metro
          python scripts/compute_apt_rankings.py --region-group metro

      - name: Collect and Compute (Central)
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: |
          rm -f data/apt.sqlite run_meta.json
          python scripts/db.py
          python scripts/collect_trades.py --region-group central
          python scripts/compute_apt_rankings.py --region-group central

      - name: Collect and Compute (South)
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: |
          rm -f data/apt.sqlite run_meta.json
          python scripts/db.py
          python scripts/collect_trades.py --region-group south
          python scripts/compute_apt_rankings.py --region-group south

      - name: Validate Shards
        run: python scripts/validate_shard.py

      - name: Merge Shards
        run: python scripts/merge_shards.py

      - name: Validate JSON
        run: python scripts/validate_json.py

      - name: Push Shards and National JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/shards/
          git add site/data/apt_rankings_*.json
          git commit -m "Update nationwide apt rankings (Weekly Rollover)" || echo "No changes to commit"
          
          # 재시도 루프 (최대 3회)
          for i in {1..4}; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              echo "Push successful."
              break
            fi
            if [ $i -eq 4 ]; then
              echo "Push failed after 3 retries"
              exit 1
            fi
            echo "Push conflict, retrying in 5 seconds..."
            sleep 5
          done
