name: seoul-e2e-test
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-compute:
    runs-on: ubuntu-latest
    env:
      DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
      RONE_API_KEY: ${{ secrets.RONE_API_KEY }}
      RONE_STATBL_ID: A_2024_00045
    steps:
      - uses: actions/checkout@v4
      
      - name: API 키 누락 검사
        run: |
          missing=""
          if [ -z "$DATA_GO_KR_API_KEY" ]; then
            missing="$missing DATA_GO_KR_API_KEY"
          fi
          if [ -z "$RONE_API_KEY" ]; then
            missing="$missing RONE_API_KEY"
          fi
          if [ -n "$missing" ]; then
            echo "다음 Secret 이름이 GitHub Repository Secrets에 누락되었습니다:$missing"
            exit 1
          fi
          echo "모든 필수 API 키가 주입되었습니다."
          
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: 의존성 설치
        run: pip install -r requirements.txt
        
      - name: 법정동 코드 수집 (DB 초기화)
        run: python scripts/collect_region_codes.py
        
      - name: 실거래가 수집 (서울 25개 구, 202502~202505)
        run: |
          python scripts/collect_trades.py --sgg 11110 11140 11170 11200 11215 11230 11260 11290 11305 11320 11350 11380 11410 11440 11470 11500 11530 11545 11560 11590 11620 11650 11680 11710 11740 --months 202502 202503 202504 202505

      - name: 한국부동산원 가격지수 수집
        run: python scripts/collect_price_index.py
        
      - name: 단지 순위 계산
        run: python scripts/compute_apt_rankings.py 202505
        
      - name: 지역 순위 계산
        run: python scripts/compute_region_rankings.py

      - name: 데이터 무결성 깐깐한 검증
        run: python scripts/validate_json.py

      - name: 결과 JSON만 커밋 & 푸시
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # DB 파일은 제외하고 site/data 내부의 JSON 파일만 커밋
          git add site/data/*.json
          git diff --cached --quiet || git commit -m "chore: e2e test seoul 25"
          git push
