<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아파트 상승률 랭킹</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root{
    --ink:#191f28; --sub:#6b7684; --line:#e5e8eb; --bg:#fff; --panel:#f7f8fa;
    --up:#d6293e; --down:#2563c9; /* 국내 시세 관례: 상승=적색, 하락=청색 */
  }
  *{box-sizing:border-box; margin:0}
  body{font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;
       color:var(--ink); background:var(--bg); line-height:1.5;
       font-feature-settings:"tnum"; padding:0 16px 64px}
  .wrap{max-width:880px; margin:0 auto}
  header{padding:40px 0 8px}
  h1{font-size:1.45rem; font-weight:800; letter-spacing:-.02em}
  .meta{color:var(--sub); font-size:.85rem; margin-top:4px}
  .meta .badge{display:inline-block; border:1px solid var(--line); border-radius:4px;
               padding:1px 6px; margin-left:6px; font-size:.75rem}
  nav{display:flex; gap:4px; margin:20px 0 0; border-bottom:1px solid var(--line)}
  nav button{border:0; background:none; font:inherit; font-weight:600; color:var(--sub);
             padding:10px 14px; cursor:pointer; border-bottom:2px solid transparent}
  nav button[aria-selected="true"]{color:var(--ink); border-bottom-color:var(--ink)}
  table{width:100%; border-collapse:collapse; margin-top:8px; font-size:.9rem}
  th,td{padding:10px 8px; text-align:right; border-bottom:1px solid var(--line);
        white-space:nowrap}
  th{color:var(--sub); font-weight:500; font-size:.78rem}
  th:nth-child(2), td:nth-child(2){text-align:left}
  td.name{text-align:left; max-width:280px; overflow:hidden; text-overflow:ellipsis}
  .rate{font-weight:700}
  .rate.up{color:var(--up)} .rate.down{color:var(--down)}
  /* 시그니처: 상승률을 셀 안 막대로 함께 표시 */
  .bar{display:inline-block; height:8px; background:var(--up); opacity:.25;
       border-radius:2px; vertical-align:middle; margin-left:6px}
  .conf{font-size:.72rem; color:var(--sub); border:1px solid var(--line);
        border-radius:4px; padding:0 5px}
  .empty{padding:48px 0; text-align:center; color:var(--sub); font-size:.9rem}
  footer{margin-top:32px; color:var(--sub); font-size:.75rem}
  @media (max-width:640px){ .hide-m{display:none} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>아파트 가격 상승률 랭킹</h1>
    <p class="meta" id="meta">데이터 불러오는 중…</p>
  </header>

  <nav role="tablist">
    <button role="tab" aria-selected="true"  data-tab="region">시군구 상승률</button>
    <button role="tab" aria-selected="false" data-tab="apt">개별 아파트</button>
  </nav>

  <div id="content"><p class="empty">불러오는 중…</p></div>

  <footer>
    시군구: 한국부동산원 전국주택가격동향조사 가격지수 ·
    개별 단지: 국토교통부 실거래가 (해제 거래 제외, 최신 월 잠정치)
  </footer>
</div>

<script>
const state = { tab: "region", region: null, apt: null };
const won = v => v == null ? "–" :
  v >= 1e8 ? (v/1e8).toFixed(v % 1e8 ? 1 : 0) + "억" : Math.round(v/1e4).toLocaleString() + "만";
const rate = v => v == null ? "–" :
  `<span class="rate ${v>0?"up":v<0?"down":""}">${v>0?"+":""}${v.toFixed(2)}%</span>`;
const confLabel = { high:"신뢰도 높음", medium:"보통", low:"낮음" };

async function load(name){
  try{
    const r = await fetch(`data/${name}_rankings_latest.json`, {cache:"no-store"});
    if(!r.ok) throw 0;
    return await r.json();
  }catch{ return null; }
}

function renderRegion(d){
  if(!d || !d.items.length) return `<p class="empty">아직 지역 데이터가 없습니다.<br>collect_price_index.py → compute_region_rankings.py 순으로 실행해 주세요.</p>`;
  const max = Math.max(...d.items.map(i=>Math.abs(i.momRate||0)), 0.01);
  const rows = d.items.slice(0,50).map(i=>`
    <tr><td>${i.rank}</td><td class="name">${i.regionName}</td>
    <td>${rate(i.momRate)}<span class="bar" style="width:${Math.abs(i.momRate)/max*48}px"></span></td>
    <td class="hide-m">${rate(i.threeMonthRate)}</td>
    <td class="hide-m">${rate(i.yoyRate)}</td></tr>`).join("");
  return `<table><thead><tr><th>순위</th><th>지역</th><th>전월 대비</th>
    <th class="hide-m">3개월</th><th class="hide-m">전년 동월</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function renderApt(d){
  if(!d || !d.items.length) return `<p class="empty">아직 단지 데이터가 없습니다.<br>collect_trades.py → compute_apt_rankings.py 순으로 실행해 주세요.</p>`;
  const rows = d.items.slice(0,100).map(i=>`
    <tr><td>${i.rank}</td>
    <td class="name">${i.region}<br><b>${i.apartmentName}</b> ${i.exclusiveAreaGroup}㎡</td>
    <td class="hide-m">${won(i.baselineMedianPrice)}</td>
    <td>${won(i.currentMedianPrice)}</td>
    <td>${rate(i.riseRate)}<br><span class="conf">${confLabel[i.confidence]||""} · ${i.currentTradeCount}건</span></td>
    </tr>`).join("");
  return `<table><thead><tr><th>순위</th><th>단지</th>
    <th class="hide-m">기준가(3개월)</th><th>최근가</th><th>상승률</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function paint(){
  const d = state[state.tab];
  document.getElementById("content").innerHTML =
    state.tab === "region" ? renderRegion(d) : renderApt(d);
  const meta = document.getElementById("meta");
  if(d){
    const m = d.referenceMonth;
    meta.innerHTML = `${m.slice(0,4)}년 ${+m.slice(4)}월 기준` +
      (d.status === "provisional" ? `<span class="badge">잠정 집계</span>` : "");
  } else meta.textContent = "데이터 없음";
}

document.querySelectorAll("nav button").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll("nav button").forEach(x=>x.setAttribute("aria-selected", x===b));
  state.tab = b.dataset.tab; paint();
}));

(async()=>{
  [state.region, state.apt] = await Promise.all([load("region"), load("apt")]);
  paint();
})();
</script>
</body>
</html>
